<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haftalık Plan — Gözlemci Zihni</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body class="app-page">
  <div class="noise"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="eye-icon small">
        <svg viewBox="0 0 80 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 20 C20 4, 60 4, 76 20 C60 36, 20 36, 4 20Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="40" cy="20" r="8" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="40" cy="20" r="3" fill="currentColor"/>
        </svg>
      </div>
      <span>Gözlemci</span>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html" data-tr="Ana Sayfa" data-en="Dashboard">Ana Sayfa</a></li>
      <li><a href="modules.html" data-tr="Modüller" data-en="Modules">Modüller</a></li>
      <li><a href="weekly.html" class="active" data-tr="Haftalık Plan" data-en="Weekly Plan">Haftalık Plan</a></li>
      <li><a href="quiz.html" data-tr="Quiz" data-en="Quiz">Quiz</a></li>
      <li><a href="notes.html" data-tr="Notlarım" data-en="My Notes">Notlarım</a></li>
    </ul>
    <div class="sidebar-bottom">
      <button class="lang-toggle" id="langToggle">EN</button>
      <button class="logout-btn" id="logoutBtn" title="Çıkış">⏻</button>
    </div>
  </nav>
  <button class="hamburger" id="hamburger">☰</button>

  <main class="main-content">
    <header class="page-header">
      <div>
        <h2 class="page-title" data-tr="Haftalık Eğitim Planı" data-en="Weekly Training Plan">Haftalık Eğitim Planı</h2>
        <p class="page-sub" data-tr="8 haftalık sistematik program. Her hafta yeni bir beceri katmanı." data-en="8-week systematic program. A new skill layer each week.">8 haftalık sistematik program. Her hafta yeni bir beceri katmanı.</p>
      </div>
    </header>

    <div class="week-selector">
      <button class="week-arrow" id="prevWeek">←</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-arrow" id="nextWeek">→</button>
    </div>

    <div class="week-content" id="weekContent"></div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/content.js"></script>
  <script>
    requireAuth();
    initLang();

    let currentWeek = parseInt(localStorage.getItem("mt_week") || "1");
    renderWeek();

    document.getElementById("prevWeek").addEventListener("click", () => {
      if (currentWeek > 1) { currentWeek--; localStorage.setItem("mt_week", currentWeek); renderWeek(); }
    });
    document.getElementById("nextWeek").addEventListener("click", () => {
      if (currentWeek < WEEKLY_PLAN.length) { currentWeek++; localStorage.setItem("mt_week", currentWeek); renderWeek(); }
    });

    function renderWeek() {
      const lang = getLang();
      const week = WEEKLY_PLAN[currentWeek - 1];
      document.getElementById("weekLabel").textContent = lang === 'tr' ? `${currentWeek}. Hafta` : `Week ${currentWeek}`;

      const container = document.getElementById("weekContent");
      container.innerHTML = `
        <div class="week-theme-card">
          <div class="week-theme-icon">${week.icon}</div>
          <div>
            <h3>${week.theme[lang]}</h3>
            <p>${week.overview[lang]}</p>
          </div>
        </div>
        <div class="days-grid">
          ${week.days.map((day, i) => {
            const dayKey = `week${currentWeek}_day${i+1}`;
            const done = localStorage.getItem("mt_day_" + dayKey) === "1";
            return `
            <div class="day-card ${done ? 'day-done' : ''}">
              <div class="day-header">
                <span class="day-name">${DAY_NAMES[lang][i]}</span>
                ${done ? '<span class="day-check">✓</span>' : ''}
              </div>
              <h4>${day.title[lang]}</h4>
              <p>${day.task[lang]}</p>
              <div class="day-meta">
                <span>⏱ ${day.duration}</span>
                <button class="day-done-btn ${done ? 'done' : ''}" data-key="${dayKey}">
                  ${done ? (lang==='tr'?'Tamamlandı':'Completed') : (lang==='tr'?'Tamamla':'Complete')}
                </button>
              </div>
            </div>`;
          }).join('')}
        </div>
      `;

      document.querySelectorAll(".day-done-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.key;
          localStorage.setItem("mt_day_" + key, "1");
          renderWeek();
        });
      });
    }
  </script>
</body>
</html>
